<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✏️ PERSONALIZE: título da aba -->
    <title>Login | Painel de Controle</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav class="navbar navbar-custom">
        <a class="navbar-brand" href="#">
            <!-- ✏️ PERSONALIZE: substitua pela sua logo -->
            <div class="logo-placeholder">
                <span class="logo-icon">◈</span>
                <span class="logo-text">SUA LOGO</span>
            </div>
        </a>
        <div id="switch" onclick="togglemode()">
            <button></button>
            <span></span>
        </div>
    </nav>

    <div class="login-container">
        <div class="background-pattern"></div>

        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <!-- ✏️ Troque o ícone se preferir outro -->
                    <i class="fas fa-layer-group"></i>
                </div>
                <!-- ✏️ PERSONALIZE: título e subtítulo do card -->
                <h1>Painel de Controle</h1>
                <p>Acesse para consultar as respostas do formulário</p>
            </div>

            <!-- Aviso de demonstração — remova em produção -->
            <div class="demo-banner">
                <i class="fas fa-flask"></i>
                <div>
                    <strong>Modo demonstração</strong>
                    <span>Use <code>teste@teste.com</code> / <code>Teste@123</code></span>
                </div>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> E-mail
                    </label>
                    <input
                        type="email" class="form-control" id="email" name="email"
                        placeholder="seu@email.com" required autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <div class="password-wrapper">
                        <input
                            type="password" class="form-control" id="password" name="password"
                            placeholder="••••••••" required autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>

                <div class="alert alert-danger" id="errorAlert" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage"></span>
                </div>

                <div class="loading-message" id="loadingMessage" style="display:none;">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Entrando...</span>
                </div>
            </form>

            <div class="login-footer">
                <!-- ✏️ Altere o texto do rodapé -->
                <p>© 2025 Sua Empresa. Todos os direitos reservados.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
